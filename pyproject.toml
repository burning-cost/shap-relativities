[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shap-relativities"
version = "0.1.0"
description = "Extract multiplicative rating relativities from GBM models using SHAP values. Built for insurance pricing."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Burning Cost", email = "pricing.frontier@gmail.com" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy",
    "pandas",
    "scipy",
]

[project.optional-dependencies]
ml = [
    "shap",
    "lightgbm",
    "xgboost",
    "matplotlib",
]
dev = [
    "pytest",
]

[project.urls]
Homepage = "https://github.com/burning-cost/shap-relativities"
Repository = "https://github.com/burning-cost/shap-relativities"

[tool.hatch.build.targets.wheel]
packages = ["src/shap_relativities"]

[tool.pytest.ini_options]
testpaths = ["tests"]
